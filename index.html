<title>Kisan Sathi – آپ کا ڈیجیٹل دوست</title>

<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --green-900:#0d3320;--green-800:#1a5c37;--green-700:#1e7a45;--green-600:#22943f;
  --green-500:#27ae60;--green-400:#4cbb7a;--green-300:#7ed8a0;--green-100:#e8f7ee;--green-50:#f0fbf4;
  --orange:#f5a623;--red:#e74c3c;--bg:#f4f6f4;--white:#ffffff;--gray-50:#f9fafb;
  --gray-100:#f3f4f6;--gray-200:#e5e7eb;--gray-300:#d1d5db;--gray-400:#9ca3af;
  --gray-500:#6b7280;--gray-700:#374151;--gray-900:#111827;
  --shadow-sm:0 1px 3px rgba(0,0,0,.08);--shadow:0 4px 16px rgba(0,0,0,.1);
  --shadow-lg:0 8px 32px rgba(0,0,0,.14);--radius:16px;--radius-sm:10px;--radius-xs:8px;
}
body{font-family:'Plus Jakarta Sans',sans-serif;background:var(--bg);color:var(--gray-900);
  min-height:100vh;display:flex;justify-content:center;overflow-x:hidden}
#root{width:100%;max-width:430px;min-height:100vh;background:var(--bg);
  position:relative;overflow:hidden;box-shadow:0 0 40px rgba(0,0,0,.15)}
.urdu{font-family:'Noto Nastaliq Urdu',serif;direction:rtl;text-align:right}
.fade-in{animation:fadeIn .35s ease both}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:none}}
.slide-up{animation:slideUp .4s cubic-bezier(.16,1,.3,1) both}
@keyframes slideUp{from{opacity:0;transform:translateY(24px)}to{opacity:1;transform:none}}
.scale-in{animation:scaleIn .3s cubic-bezier(.16,1,.3,1) both}
@keyframes scaleIn{from{opacity:0;transform:scale(.92)}to{opacity:1;transform:scale(1)}}
.pulse{animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.6}}
/* scrollable area above nav */
.page-wrap{height:100vh;overflow-y:auto;padding-bottom:80px;scroll-behavior:smooth}
.page-wrap::-webkit-scrollbar{display:none}
/* bottom nav */
.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);
  width:100%;max-width:430px;background:var(--white);border-top:1px solid var(--gray-100);
  display:flex;align-items:center;justify-content:space-around;padding:8px 4px 12px;
  z-index:100;box-shadow:0 -4px 20px rgba(0,0,0,.06)}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:3px;padding:4px 12px;
  border:none;background:transparent;cursor:pointer;transition:all .2s;color:var(--gray-400);
  font-size:11px;font-weight:600;font-family:'Plus Jakarta Sans',sans-serif}
.nav-item.active{color:var(--green-700)}
.nav-item .nav-icon-wrap{width:42px;height:42px;border-radius:14px;display:flex;
  align-items:center;justify-content:center;transition:all .2s}
.nav-item.active .nav-icon-wrap{background:var(--green-700);color:#fff}
/* top header */
.top-header{background:var(--white);padding:14px 20px 10px;
  display:flex;align-items:center;justify-content:space-between;
  border-bottom:1px solid var(--gray-100);position:sticky;top:0;z-index:50}
.logo-text{font-size:20px;font-weight:800;color:var(--green-700)}
.bell-btn{width:38px;height:38px;border-radius:50%;background:var(--gray-100);
  display:flex;align-items:center;justify-content:center;border:none;cursor:pointer;
  position:relative;transition:background .2s}
.bell-btn:hover{background:var(--gray-200)}
.badge{position:absolute;top:-2px;right:-2px;width:16px;height:16px;
  background:var(--red);border-radius:50%;font-size:9px;color:#fff;font-weight:700;
  display:flex;align-items:center;justify-content:center;border:2px solid #fff}
/* cards */
.card{background:var(--white);border-radius:var(--radius);padding:18px;
  box-shadow:var(--shadow-sm);transition:box-shadow .2s}
.card:hover{box-shadow:var(--shadow)}
.green-card{background:linear-gradient(135deg,var(--green-800),var(--green-600));
  border-radius:var(--radius);padding:20px;color:#fff}
.peach-card{background:linear-gradient(135deg,#fff3e8,#ffe8d0);border-radius:var(--radius);padding:16px}
/* buttons */
.btn-primary{background:var(--green-700);color:#fff;border:none;border-radius:12px;
  padding:14px 20px;font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;
  width:100%;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-primary:hover{background:var(--green-800);transform:translateY(-1px)}
.btn-primary:active{transform:none}
.btn-secondary{background:var(--white);color:var(--green-700);border:2px solid var(--green-700);
  border-radius:12px;padding:12px 20px;font-size:15px;font-weight:700;
  font-family:inherit;cursor:pointer;width:100%;transition:all .2s}
.btn-outline{background:transparent;color:var(--green-700);border:1.5px solid var(--green-300);
  border-radius:10px;padding:8px 14px;font-size:13px;font-weight:600;font-family:inherit;
  cursor:pointer;transition:all .2s}
.btn-outline:hover{background:var(--green-50)}
/* inputs */
.input-wrap{position:relative;margin-bottom:16px}
.input-label{font-size:13px;font-weight:600;color:var(--gray-700);margin-bottom:6px;
  display:block;text-align:right;font-family:'Noto Nastaliq Urdu',serif}
.input-field{width:100%;padding:13px 16px 13px 42px;border:1.5px solid var(--gray-200);
  border-radius:12px;font-size:15px;font-family:inherit;outline:none;
  background:var(--white);transition:border-color .2s;color:var(--gray-900)}
.input-field:focus{border-color:var(--green-500)}
.input-icon{position:absolute;left:14px;top:50%;transform:translateY(-50%);color:var(--gray-400)}
/* tags / pills */
.pill{padding:6px 14px;border-radius:20px;font-size:12px;font-weight:700;
  display:inline-flex;align-items:center;gap:4px}
.pill-green{background:var(--green-100);color:var(--green-700)}
.pill-orange{background:#fff3e0;color:#e65100}
.pill-red{background:#fdecea;color:var(--red)}
.pill-gray{background:var(--gray-100);color:var(--gray-500)}
/* trend badge */
.trend-up{background:#e8f5e9;color:#2e7d32;padding:3px 8px;border-radius:20px;
  font-size:11px;font-weight:700;display:inline-flex;align-items:center;gap:2px}
.trend-down{background:#fdecea;color:var(--red);padding:3px 8px;border-radius:20px;
  font-size:11px;font-weight:700;display:inline-flex;align-items:center;gap:2px}
.trend-flat{background:var(--gray-100);color:var(--gray-500);padding:3px 8px;border-radius:20px;
  font-size:11px;font-weight:700;display:inline-flex;align-items:center;gap:2px}
/* splash */
.splash{background:linear-gradient(160deg,var(--green-800) 0%,var(--green-600) 100%);
  height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:flex-end}
/* chat */
.chat-bubble-user{background:var(--green-700);color:#fff;border-radius:18px 18px 4px 18px;
  padding:12px 16px;max-width:80%;font-size:15px;line-height:1.5;margin-left:auto}
.chat-bubble-bot{background:var(--white);border-radius:18px 18px 18px 4px;
  padding:12px 16px;max-width:88%;font-size:15px;line-height:1.5;box-shadow:var(--shadow-sm)}
.chat-action-box{background:var(--green-50);border:1px solid var(--green-200);
  border-radius:12px;padding:12px 14px;margin-top:10px}
/* loading */
.spinner{width:40px;height:40px;border:3px solid var(--green-100);
  border-top-color:var(--green-600);border-radius:50%;animation:spin .7s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
/* modal overlay */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:200;
  display:flex;align-items:flex-end;justify-content:center;backdrop-filter:blur(2px)}
.modal-sheet{background:var(--white);border-radius:24px 24px 0 0;padding:24px 20px 40px;
  width:100%;max-width:430px;animation:sheetUp .35s cubic-bezier(.16,1,.3,1) both}
@keyframes sheetUp{from{transform:translateY(100%)}to{transform:none}}
/* switch toggle */
.toggle{position:relative;display:inline-block;width:46px;height:26px}
.toggle input{opacity:0;width:0;height:0}
.slider{position:absolute;inset:0;background:var(--gray-300);border-radius:13px;
  transition:.3s;cursor:pointer}
.slider:before{content:'';position:absolute;width:20px;height:20px;left:3px;bottom:3px;
  background:#fff;border-radius:50%;transition:.3s}
input:checked+.slider{background:var(--green-600)}
input:checked+.slider:before{transform:translateX(20px)}
/* section title */
.section-title{font-size:17px;font-weight:800;color:var(--gray-900);margin-bottom:14px}
.section-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:12px}
.view-all{font-size:13px;font-weight:700;color:var(--green-700);background:none;
  border:none;cursor:pointer;font-family:inherit}
/* scrollable row */
.scroll-row{display:flex;gap:10px;overflow-x:auto;padding-bottom:4px}
.scroll-row::-webkit-scrollbar{display:none}
/* crop card in marketplace */
.crop-card{background:var(--white);border-radius:var(--radius);overflow:hidden;
  box-shadow:var(--shadow-sm);margin-bottom:14px}
.crop-img{width:100%;height:160px;object-fit:cover;display:block;
  background:linear-gradient(135deg,#c8e6c9,#a5d6a7)}
/* empty state */
.empty-state{text-align:center;padding:60px 30px;color:var(--gray-400)}
.empty-icon{font-size:60px;margin-bottom:16px}
/* alert card */
.alert-card{border-radius:12px;padding:14px;display:flex;align-items:flex-start;gap:12px;margin-bottom:10px}
.alert-card.red{background:#fdecea;border-left:4px solid var(--red)}
.alert-card.orange{background:#fff8e1;border-left:4px solid #f59e0b}
.alert-card.green{background:var(--green-50);border-left:4px solid var(--green-500)}
/* shimmer */
.shimmer{background:linear-gradient(90deg,#f0f0f0 25%,#e0e0e0 50%,#f0f0f0 75%);
  background-size:200% 100%;animation:shimmer 1.4s infinite;border-radius:8px}
@keyframes shimmer{from{background-position:200% 0}to{background-position:-200% 0}}
/* price chart line */
.mini-line{height:36px;overflow:hidden}
/* admin grid */
.stat-grid{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-bottom:16px}
/* settings row */
.settings-row{display:flex;align-items:center;justify-content:space-between;
  padding:14px 16px;background:var(--white);border-radius:12px;margin-bottom:8px;cursor:pointer}
.settings-row:hover{background:var(--gray-50)}
/* notification item */
.notif-item{display:flex;gap:12px;padding:14px 0;border-bottom:1px solid var(--gray-100)}
/* tab bar (secondary) */
.tab-bar{display:flex;gap:8px;overflow-x:auto;padding:0 20px 14px;scroll-behavior:smooth}
.tab-bar::-webkit-scrollbar{display:none}
.tab-btn{padding:8px 18px;border-radius:20px;font-size:13px;font-weight:700;
  border:none;cursor:pointer;font-family:inherit;white-space:nowrap;transition:all .2s}
.tab-btn.active{background:var(--green-700);color:#fff}
.tab-btn:not(.active){background:var(--white);color:var(--gray-500);box-shadow:var(--shadow-sm)}
/* premium card */
.premium-feature{background:var(--white);border-radius:14px;padding:16px;
  margin-bottom:10px;box-shadow:var(--shadow-sm);display:flex;gap:12px;align-items:flex-start}
/* onboarding dot */
.dot{width:8px;height:8px;border-radius:4px;background:var(--green-300);transition:all .3s}
.dot.active{background:var(--green-700);width:24px}
/* whatsapp green */
.wa-btn{background:#25d366;color:#fff;border:none;border-radius:12px;
  padding:13px 20px;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;
  width:100%;display:flex;align-items:center;justify-content:center;gap:8px;transition:all .2s}
.wa-btn:hover{background:#128c7e}
/* profile avatar ring */
.avatar-ring{border:3px solid var(--green-400);border-radius:50%;padding:2px}
/* live badge */
.live-badge{background:var(--red);color:#fff;font-size:10px;font-weight:800;
  padding:2px 7px;border-radius:10px;display:inline-flex;align-items:center;gap:4px}
.live-dot{width:5px;height:5px;background:#fff;border-radius:50%;animation:pulse 1s infinite}
/* sold badge */
.sold-badge{background:var(--gray-400);color:#fff;font-size:10px;font-weight:700;padding:2px 7px;border-radius:10px}
/* Skeleton placeholders */
.skel{background:var(--gray-100);border-radius:8px}
/* Live price flash */
@keyframes flashUp{0%{background:#e8f5e9}60%{background:#c8e6c9}100%{background:var(--white)}}
@keyframes flashDown{0%{background:#fdecea}60%{background:#ffcdd2}100%{background:var(--white)}}
.flash-up{animation:flashUp 1.2s ease both}
.flash-down{animation:flashDown 1.2s ease both}
/* Price number pop */
@keyframes popUp{0%{transform:scale(1)}40%{transform:scale(1.1)}100%{transform:scale(1)}}
.pop{animation:popUp .4s cubic-bezier(.16,1,.3,1)}
/* Live dot */
@keyframes livePulse{0%,100%{transform:scale(1);opacity:1}50%{transform:scale(1.6);opacity:.6}}
.live-pulse{animation:livePulse 1.2s infinite}
/* Ticker */
@keyframes ticker{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
.ticker-inner{display:inline-flex;gap:32px;animation:ticker 30s linear infinite;white-space:nowrap}
.ticker-inner:hover{animation-play-state:paused}
.ticker-wrap{overflow:hidden;background:var(--green-900);padding:7px 0}
</style>
</head>

/* ── LIVE PRICE SIMULATION HOOK ─────────────────────────────── */
const useLivePrices=()=>{
  const [prices,setPrices]=useState(()=>BASE_PRICES.map(p=>({...p})));
  const [flashIds,setFlashIds]=useState({});          // {id: 'up'|'down'}
  const [lastUpdated,setLastUpdated]=useState(new Date());
  const [secondsAgo,setSecondsAgo]=useState({});      // {id: seconds}

  // Tick every 8 seconds — update random 2-4 crops
  useEffect(()=>{
    const interval=setInterval(()=>{
      setPrices(prev=>{
        const next=[...prev];
        // pick 2–4 random crops to update
        const shuffled=[...next].sort(()=>Math.random()-.5);
        const toUpdate=shuffled.slice(0,Math.floor(Math.random()*3)+2);
        const newFlash={};
        const newSeconds={};
        toUpdate.forEach(crop=>{
          const idx=next.findIndex(c=>c.id===crop.id);
          if(idx===-1)return;
          const vol=crop.volatility;
          // random walk with slight mean-reversion to base
          const base=BASE_PRICES[idx].price;
          const current=next[idx].price;
          const meanRevert=(base-current)*0.05;
          const randomMove=(Math.random()-.5)*2*vol*current;
          const newPrice=Math.round(current+randomMove+meanRevert);
          const oldPrice=current;
          const change=parseFloat(((newPrice-oldPrice)/oldPrice*100).toFixed(1));
          // append to trend (keep last 7)
          const newTrend=[...next[idx].trend.slice(-6),newPrice];
          newFlash[crop.id]=newPrice>oldPrice?'up':'down';
          newSeconds[crop.id]=0;
          next[idx]={...next[idx],price:newPrice,change,trend:newTrend};
        });
        setFlashIds(newFlash);
        setSecondsAgo(prev2=>{
          const merged={...prev2,...newSeconds};
          return merged;
        });
        setTimeout(()=>setFlashIds({}),1200);
        return next;
      });
      setLastUpdated(new Date());
    },8000);
    // seconds counter
    const clock=setInterval(()=>{
      setSecondsAgo(prev=>{
        const next={};
        Object.keys(prev).forEach(id=>{next[id]=prev[id]+1;});
        return next;
      });
    },1000);
    return()=>{clearInterval(interval);clearInterval(clock);};
  },[]);

  return {prices,flashIds,lastUpdated,secondsAgo};
};

          sub:'Action Required',bg:'#fdecea',ic:'var(--red)'},
         {icon:'credit_card',label:'Monthly Revenue',val:'Rs 845k',
          sub:'Target: Rs 1M',bg:'#f3e8ff',ic:'#8b5cf6'},
        ].map(s=>React.createElement(AnalyticsCard,{key:s.label,...s,color:s.bg,iconColor:s.ic}))),
      /* growth chart */
      React.createElement('div',{className:'green-card',style:{marginBottom:16}},
        React.createElement('h3',{style:{fontWeight:800,fontSize:16,marginBottom:4}},'User Growth Trends'),
        React.createElement('p',{style:{fontSize:12,color:'rgba(255,255,255,.7)',marginBottom:12}},
          'Aggregated metrics for June 2024'),
        React.createElement(ResponsiveContainer,{width:'100%',height:120},
          React.createElement(AreaChart,{data:GROWTH},
            React.createElement('defs',null,
              React.createElement('linearGradient',{id:'ug',x1:'0',y1:'0',x2:'0',y2:'1'},
                React.createElement('stop',{offset:'5%',stopColor:'rgba(255,255,255,.4)',stopOpacity:.8}),
                React.createElement('stop',{offset:'95%',stopColor:'rgba(255,255,255,.05)',stopOpacity:0}))),

        alignItems:'center',marginBottom:10}},
        React.createElement('h3',{className:'section-title',style:{margin:0}},'Pending Approvals'),

/* Error / Empty */
const ErrorPage=({setPage})=>
  React.createElement('div',{style:{height:'100vh',display:'flex',flexDirection:'column',
    alignItems:'center',justifyContent:'center',padding:32,textAlign:'center',background:'var(--white)'}},
    React.createElement('div',{style:{fontSize:72,marginBottom:16}},'🌾'),
    React.createElement('h2',{style:{fontWeight:800,fontSize:22,marginBottom:8}},'Something went wrong'),
    React.createElement('p',{style:{color:'var(--gray-400)',marginBottom:24,lineHeight:1.6}},
      "We're working to fix the issue. Please try again shortly."),
    React.createElement('button',{className:'btn-primary',style:{width:'auto',padding:'12px 28px'},
      onClick:()=>setPage('home')},'Go to Home'));

/* ── ROOT APP ────────────────────────────────────────────────── */
const App=()=>{
  const [screen,setScreen]=useState('splash'); // splash | onboarding | login | app
  const [page,setPage]=useState('home');

  const navigatePage=(p)=>{
    if(p==='notifications'||p==='favorites'||p==='premium'||p==='upgrade'||p==='admin'){
      setPage(p);
    } else {
      setPage(p);
    }
  };

  if(screen==='splash') return React.createElement(SplashScreen,{onDone:()=>setScreen('onboarding')});
  if(screen==='onboarding') return React.createElement(Onboarding,{onDone:()=>setScreen('login')});
  if(screen==='login') return React.createElement(Login,{onLogin:()=>setScreen('app')});

  // App screens
  const common={setPage:navigatePage};
  const map={
    home:React.createElement(Home,{...common}),
    market:React.createElement(Market,{...common}),
    prices:React.createElement(Prices,{...common}),
    assistant:React.createElement(Assistant,{...common}),
    weather:React.createElement(WeatherPage,{...common}),
    profile:React.createElement(Profile,{...common,onLogout:()=>setScreen('login')}),
    premium:React.createElement(Premium,{...common}),
    upgrade:React.createElement(Upgrade,{...common}),
    notifications:React.createElement(NotificationsPage,{...common}),
    favorites:React.createElement(Favorites,{...common}),
    admin:React.createElement(Admin,{...common}),
    error:React.createElement(ErrorPage,{...common}),
  };

  return React.createElement('div',{className:'fade-in'},map[page]||map.home);
};

ReactDOM.render(React.createElement(App),document.getElementById('root'));
</script>
