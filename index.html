<!DOCTYPE html>
<html lang="ur" dir="ltr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Kisan Sathi - آپ کا ڈیجیٹل دوست</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Noto+Nastaliq+Urdu:wght@400;600;700&family=Plus+Jakarta+Sans:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --green-dark: #1a5c35;
      --green-primary: #2d7a4f;
      --green-mid: #3d9966;
      --green-light: #e8f5ee;
      --green-pale: #f0f9f4;
      --accent-orange: #f5a623;
      --accent-peach: #fde8d8;
      --accent-red: #e74c3c;
      --text-dark: #1a1a2e;
      --text-mid: #4a5568;
      --text-light: #718096;
      --bg-main: #f5f7f2;
      --white: #ffffff;
      --shadow-sm: 0 2px 8px rgba(45,122,79,0.10);
      --shadow-md: 0 4px 20px rgba(45,122,79,0.15);
      --radius: 16px;
      --radius-sm: 10px;
    }
    html, body { height: 100%; background: #e8ecdf; font-family: 'Plus Jakarta Sans', sans-serif; }
    #root { height: 100%; display: flex; justify-content: center; align-items: flex-start; min-height: 100vh; }
    .phone-wrap {
      width: 100%; max-width: 430px; min-height: 100vh;
      background: var(--bg-main); position: relative;
      display: flex; flex-direction: column; overflow: hidden;
    }
    .screen { flex: 1; overflow-y: auto; padding-bottom: 80px; }
    .screen::-webkit-scrollbar { display: none; }

    /* NAV */
    .bottom-nav {
      position: fixed; bottom: 0; left: 50%; transform: translateX(-50%);
      width: 100%; max-width: 430px;
      background: var(--white); border-top: 1px solid #e2e8f0;
      display: flex; justify-content: space-around; align-items: center;
      padding: 10px 0 16px; z-index: 100; box-shadow: 0 -4px 20px rgba(0,0,0,0.08);
    }
    .nav-item { display: flex; flex-direction: column; align-items: center; gap: 4px; cursor: pointer; padding: 4px 16px; border-radius: 12px; transition: all 0.2s; }
    .nav-item span { font-size: 11px; color: var(--text-light); font-weight: 500; }
    .nav-item.active span { color: var(--green-primary); }
    .nav-icon { width: 22px; height: 22px; display: flex; align-items: center; justify-content: center; color: var(--text-light); }
    .nav-item.active .nav-icon { color: var(--green-primary); }
    .nav-bubble { background: var(--green-primary); border-radius: 20px; padding: 10px 20px; display: flex; flex-direction: column; align-items: center; gap: 4px; margin-top: -12px; }
    .nav-bubble .nav-icon { color: white; }
    .nav-bubble span { color: white; font-size: 11px; font-weight: 600; }

    /* TOP BAR */
    .topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 16px 20px 8px; background: var(--bg-main); position: sticky; top: 0; z-index: 50;
    }
    .topbar-logo { display: flex; align-items: center; gap: 10px; }
    .topbar-logo img { width: 36px; height: 36px; border-radius: 50%; object-fit: cover; }
    .topbar-logo .avatar { width: 36px; height: 36px; border-radius: 50%; background: var(--green-primary); display: flex; align-items: center; justify-content: center; color: white; font-weight: 700; font-size: 14px; border: 2px solid var(--green-mid); }
    .topbar-logo h2 { font-size: 18px; font-weight: 800; color: var(--green-dark); }
    .notif-btn { width: 36px; height: 36px; border-radius: 50%; background: var(--white); border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; box-shadow: var(--shadow-sm); position: relative; }
    .notif-dot { position: absolute; top: 8px; right: 8px; width: 8px; height: 8px; background: var(--accent-red); border-radius: 50%; border: 2px solid white; }

    /* CARDS */
    .card { background: var(--white); border-radius: var(--radius); padding: 20px; box-shadow: var(--shadow-sm); }
    .card-green { background: var(--green-dark); color: white; border-radius: var(--radius); padding: 24px; }
    .section-title { font-size: 20px; font-weight: 800; color: var(--text-dark); margin-bottom: 16px; }
    .badge { display: inline-flex; align-items: center; padding: 4px 10px; border-radius: 20px; font-size: 11px; font-weight: 700; }
    .badge-orange { background: var(--accent-peach); color: #c0621a; }
    .badge-green { background: var(--green-light); color: var(--green-dark); }
    .badge-red { background: #fde8e8; color: var(--accent-red); }
    .badge-gray { background: #f0f0f0; color: #666; }

    /* BUTTONS */
    .btn { display: flex; align-items: center; justify-content: center; gap: 8px; padding: 14px 24px; border-radius: 12px; font-weight: 700; font-size: 15px; cursor: pointer; border: none; transition: all 0.2s; width: 100%; }
    .btn-primary { background: var(--green-primary); color: white; }
    .btn-primary:hover { background: var(--green-dark); transform: translateY(-1px); box-shadow: var(--shadow-md); }
    .btn-outline { background: transparent; color: var(--green-primary); border: 2px solid var(--green-primary); }
    .btn-peach { background: var(--accent-peach); color: #c0621a; }
    .btn-whatsapp { background: #25d366; color: white; }
    .btn-white { background: white; color: var(--green-dark); }

    /* INPUT */
    .input-field { width: 100%; padding: 14px 16px; border: 1.5px solid #e2e8f0; border-radius: 12px; font-size: 15px; font-family: 'Plus Jakarta Sans', sans-serif; outline: none; background: white; transition: border-color 0.2s; }
    .input-field:focus { border-color: var(--green-primary); }
    .search-box { display: flex; align-items: center; gap: 10px; background: white; border-radius: 12px; padding: 12px 16px; box-shadow: var(--shadow-sm); }
    .search-box input { border: none; outline: none; flex: 1; font-size: 14px; color: var(--text-mid); background: transparent; }

    /* TAGS */
    .filter-tags { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; }
    .filter-tags::-webkit-scrollbar { display: none; }
    .tag { padding: 8px 18px; border-radius: 30px; font-size: 13px; font-weight: 600; cursor: pointer; white-space: nowrap; border: none; transition: all 0.2s; }
    .tag.active { background: var(--green-primary); color: white; }
    .tag.inactive { background: white; color: var(--text-mid); box-shadow: var(--shadow-sm); }

    /* PRICE ROW */
    .price-row { background: white; border-radius: var(--radius); padding: 18px; box-shadow: var(--shadow-sm); display: flex; gap: 14px; }
    .price-thumb { width: 56px; height: 56px; border-radius: 10px; object-fit: cover; flex-shrink: 0; }
    .price-thumb-placeholder { width: 56px; height: 56px; border-radius: 10px; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 24px; background: var(--green-light); }
    .price-info { flex: 1; }
    .price-name { font-size: 15px; font-weight: 700; color: var(--text-dark); }
    .price-time { font-size: 11px; color: var(--text-light); margin: 2px 0; }
    .price-val { font-size: 22px; font-weight: 800; color: var(--green-primary); }
    .price-unit { font-size: 13px; color: var(--text-light); font-weight: 500; }
    .price-change { font-size: 12px; font-weight: 700; padding: 3px 8px; border-radius: 20px; }
    .change-up { color: #27ae60; background: #e8f8f0; }
    .change-down { color: var(--accent-red); background: #fde8e8; }
    .change-flat { color: #888; background: #f0f0f0; }

    /* MARKET CARD */
    .market-card { background: white; border-radius: var(--radius); overflow: hidden; box-shadow: var(--shadow-sm); }
    .market-img { width: 100%; height: 160px; object-fit: cover; position: relative; }
    .market-img-wrap { position: relative; }
    .price-badge { position: absolute; top: 12px; right: 12px; background: var(--green-primary); color: white; padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: 700; }
    .market-body { padding: 14px 16px; }
    .market-name { font-size: 16px; font-weight: 700; color: var(--text-dark); }
    .market-loc { font-size: 12px; color: var(--text-light); display: flex; align-items: center; gap: 4px; margin: 4px 0 8px; }
    .market-footer { display: flex; align-items: center; justify-content: space-between; }
    .seller-info { display: flex; align-items: center; gap: 8px; }
    .seller-avatar { width: 32px; height: 32px; border-radius: 50%; background: var(--green-light); display: flex; align-items: center; justify-content: center; font-size: 12px; font-weight: 700; color: var(--green-dark); }
    .seller-name { font-size: 13px; font-weight: 600; color: var(--text-dark); }
    .seller-rating { font-size: 11px; color: var(--text-light); }
    .wa-btn { width: 40px; height: 40px; border-radius: 50%; background: #25d366; border: none; cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; box-shadow: 0 2px 8px rgba(37,211,102,0.3); }

    /* CHAT */
    .chat-bubble { max-width: 85%; padding: 14px 18px; border-radius: 18px; margin-bottom: 12px; }
    .chat-me { background: var(--green-primary); color: white; border-radius: 18px 18px 4px 18px; margin-left: auto; }
    .chat-ai { background: white; color: var(--text-dark); border-radius: 18px 18px 18px 4px; box-shadow: var(--shadow-sm); }
    .chat-time { font-size: 10px; margin-top: 6px; opacity: 0.6; text-align: right; }
    .chat-action-box { background: var(--green-light); border-radius: 12px; padding: 12px 14px; margin-top: 10px; border-left: 3px solid var(--green-primary); }

    /* SPLASH */
    .splash { width: 100%; height: 100vh; background: var(--green-primary); display: flex; flex-direction: column; align-items: center; justify-content: flex-end; position: relative; overflow: hidden; }
    .splash-img-area { flex: 1; display: flex; align-items: center; justify-content: center; padding: 40px 20px 0; }
    .splash-circle { width: 280px; height: 280px; border-radius: 50%; background: rgba(255,255,255,0.15); backdrop-filter: blur(10px); display: flex; align-items: center; justify-content: center; position: relative; }
    .splash-inner-circle { width: 240px; height: 240px; border-radius: 50%; background: rgba(255,255,255,0.2); display: flex; align-items: center; justify-content: center; font-size: 80px; }
    .splash-bottom { background: white; border-radius: 32px 32px 0 0; padding: 32px 24px 48px; width: 100%; text-align: center; }
    .splash-logo-icon { width: 72px; height: 72px; background: var(--green-light); border-radius: 20px; display: flex; align-items: center; justify-content: center; margin: -52px auto 20px; box-shadow: var(--shadow-md); font-size: 36px; }
    .splash-title { font-size: 32px; font-weight: 800; color: var(--green-dark); margin-bottom: 6px; }
    .splash-sub { font-size: 15px; color: var(--text-light); margin-bottom: 6px; font-family: 'Noto Nastaliq Urdu', serif; direction: rtl; }
    .splash-powered { font-size: 11px; color: var(--text-light); margin-top: 8px; }

    /* LOGIN */
    .login-screen { min-height: 100vh; padding: 40px 24px; display: flex; flex-direction: column; align-items: center; }
    .login-icon { width: 72px; height: 72px; background: var(--green-dark); border-radius: 20px; display: flex; align-items: center; justify-content: center; margin-bottom: 20px; font-size: 36px; box-shadow: var(--shadow-md); }
    .role-selector { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; width: 100%; margin-bottom: 24px; }
    .role-btn { border: 2px solid #e2e8f0; border-radius: 14px; padding: 20px 16px; cursor: pointer; display: flex; flex-direction: column; align-items: center; gap: 8px; background: white; transition: all 0.2s; }
    .role-btn.active { border-color: var(--green-primary); background: var(--green-light); }
    .role-btn span { font-size: 14px; font-weight: 700; color: var(--text-dark); }
    .role-btn small { font-size: 12px; color: var(--text-light); }
    .input-group { width: 100%; margin-bottom: 16px; }
    .input-label { font-size: 13px; font-weight: 600; color: var(--text-mid); margin-bottom: 6px; display: flex; justify-content: space-between; }
    .divider { display: flex; align-items: center; gap: 12px; width: 100%; margin: 20px 0; }
    .divider-line { flex: 1; height: 1px; background: #e2e8f0; }
    .divider span { font-size: 12px; color: var(--text-light); white-space: nowrap; }

    /* HOME */
    .earnings-card { background: var(--green-dark); border-radius: var(--radius); padding: 24px; color: white; position: relative; overflow: hidden; }
    .earnings-bg { position: absolute; right: 0; bottom: 0; width: 120px; height: 120px; background: rgba(255,255,255,0.05); border-radius: 50%; transform: translate(30%, 30%); }
    .earnings-amount { font-size: 32px; font-weight: 800; margin: 8px 0; }
    .earnings-label { font-size: 14px; opacity: 0.8; }
    .earnings-growth { font-size: 13px; font-weight: 700; background: rgba(255,255,255,0.15); padding: 4px 10px; border-radius: 20px; display: inline-block; margin-top: 8px; }
    .mini-bar { width: 28px; border-radius: 4px 4px 0 0; background: rgba(255,255,255,0.4); display: inline-block; margin-right: 4px; vertical-align: bottom; }
    .mini-bar.tall { background: rgba(255,255,255,0.8); }
    .mini-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .mini-card { background: white; border-radius: var(--radius-sm); padding: 16px; box-shadow: var(--shadow-sm); }
    .mini-card-title { font-size: 12px; color: var(--text-light); font-weight: 500; }
    .mini-card-val { font-size: 20px; font-weight: 800; color: var(--text-dark); margin: 4px 0 0; }
    .mini-card-sub { font-size: 11px; color: var(--text-light); }
    .weather-alert { color: var(--accent-red); font-size: 12px; font-weight: 700; }
    .assistant-banner { background: var(--green-dark); border-radius: var(--radius); padding: 18px 20px; display: flex; align-items: center; gap: 14px; cursor: pointer; }
    .assistant-banner-icon { width: 44px; height: 44px; border-radius: 50%; background: rgba(255,255,255,0.15); display: flex; align-items: center; justify-content: center; flex-shrink: 0; font-size: 22px; }
    .listing-row { background: white; border-radius: var(--radius-sm); padding: 14px; display: flex; gap: 12px; align-items: center; box-shadow: var(--shadow-sm); }
    .listing-thumb { width: 60px; height: 60px; border-radius: 10px; object-fit: cover; flex-shrink: 0; background: var(--green-light); display: flex; align-items: center; justify-content: center; font-size: 24px; }
    .listing-info { flex: 1; }
    .listing-name { font-size: 15px; font-weight: 700; color: var(--text-dark); }
    .listing-sub { font-size: 12px; color: var(--text-light); margin: 2px 0; }
    .listing-price { font-size: 16px; font-weight: 800; color: var(--green-primary); }
    .fab { position: fixed; bottom: 90px; right: calc(50% - 210px + 16px); width: 52px; height: 52px; background: var(--green-primary); border-radius: 50%; display: flex; align-items: center; justify-content: center; color: white; font-size: 28px; box-shadow: var(--shadow-md); cursor: pointer; border: none; z-index: 99; }

    /* WEATHER */
    .weather-hero { background: var(--green-dark); border-radius: var(--radius); padding: 24px; color: white; }
    .weather-loc { font-size: 14px; opacity: 0.8; margin-bottom: 4px; }
    .weather-temp { font-size: 64px; font-weight: 800; line-height: 1; }
    .weather-desc { font-size: 14px; opacity: 0.9; margin-top: 4px; }
    .weather-stats { display: flex; gap: 20px; margin-top: 20px; padding-top: 20px; border-top: 1px solid rgba(255,255,255,0.2); }
    .weather-stat { display: flex; flex-direction: column; gap: 2px; }
    .weather-stat-label { font-size: 11px; opacity: 0.7; }
    .weather-stat-val { font-size: 14px; font-weight: 700; }
    .forecast-row { display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; }
    .forecast-row::-webkit-scrollbar { display: none; }
    .forecast-day { background: white; border-radius: 12px; padding: 12px 14px; text-align: center; min-width: 72px; box-shadow: var(--shadow-sm); }
    .forecast-day.active { background: var(--green-light); border: 2px solid var(--green-primary); }
    .forecast-day-name { font-size: 12px; font-weight: 700; color: var(--text-light); margin-bottom: 8px; }
    .forecast-day-icon { font-size: 22px; margin-bottom: 6px; }
    .forecast-day-hi { font-size: 15px; font-weight: 800; color: var(--text-dark); }
    .forecast-day-lo { font-size: 11px; color: var(--text-light); }
    .advice-card { border-radius: var(--radius-sm); padding: 16px; display: flex; gap: 12px; align-items: flex-start; }
    .advice-green { background: var(--green-light); border: 1px solid rgba(45,122,79,0.2); }
    .advice-red { background: #fde8e8; border: 1px solid rgba(231,76,60,0.2); }
    .advice-orange { background: var(--accent-peach); border: 1px solid rgba(245,166,35,0.2); }
    .advice-icon { width: 40px; height: 40px; border-radius: 10px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
    .advice-icon-green { background: var(--green-primary); }
    .advice-icon-red { background: var(--accent-red); }
    .advice-icon-orange { background: var(--accent-orange); }
    .advice-title { font-size: 15px; font-weight: 700; color: var(--text-dark); margin-bottom: 4px; }
    .advice-desc { font-size: 13px; color: var(--text-mid); }

    /* PROFILE */
    .profile-header { background: white; border-radius: var(--radius); padding: 24px; text-align: center; box-shadow: var(--shadow-sm); }
    .profile-avatar { width: 88px; height: 88px; border-radius: 50%; background: var(--green-primary); display: flex; align-items: center; justify-content: center; font-size: 36px; font-weight: 800; color: white; margin: 0 auto 12px; border: 3px solid var(--green-light); position: relative; }
    .profile-edit-badge { position: absolute; bottom: 2px; right: 2px; width: 28px; height: 28px; border-radius: 50%; background: var(--green-primary); display: flex; align-items: center; justify-content: center; color: white; font-size: 13px; border: 2px solid white; }
    .profile-name { font-size: 22px; font-weight: 800; color: var(--text-dark); }
    .profile-phone { font-size: 14px; color: var(--text-light); margin: 4px 0 14px; }
    .settings-row { background: white; border-radius: var(--radius-sm); padding: 16px 18px; display: flex; align-items: center; gap: 14px; box-shadow: var(--shadow-sm); cursor: pointer; }
    .settings-icon { width: 42px; height: 42px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
    .settings-info { flex: 1; }
    .settings-title { font-size: 15px; font-weight: 700; color: var(--text-dark); }
    .settings-sub { font-size: 12px; color: var(--text-light); margin-top: 1px; }
    .lang-badge { background: var(--green-light); color: var(--green-dark); padding: 6px 12px; border-radius: 20px; font-size: 13px; font-weight: 700; }
    .logout-btn { background: white; border: 2px solid #e2e8f0; border-radius: 12px; padding: 14px; display: flex; align-items: center; justify-content: center; gap: 8px; cursor: pointer; color: var(--accent-red); font-weight: 700; font-size: 15px; width: 100%; transition: all 0.2s; }
    .logout-btn:hover { background: #fde8e8; border-color: var(--accent-red); }

    /* SUBSCRIPTION */
    .plan-card { border-radius: var(--radius); padding: 20px; box-shadow: var(--shadow-sm); }
    .plan-free { background: white; }
    .plan-premium { background: var(--green-dark); color: white; position: relative; overflow: hidden; }
    .plan-recommended { position: absolute; top: -1px; right: 16px; background: var(--accent-orange); color: white; padding: 4px 12px; border-radius: 0 0 10px 10px; font-size: 11px; font-weight: 800; }
    .plan-name { font-size: 18px; font-weight: 800; margin-bottom: 4px; }
    .plan-price { font-size: 36px; font-weight: 800; }
    .plan-period { font-size: 14px; font-weight: 500; opacity: 0.8; }
    .plan-feature { display: flex; align-items: center; gap: 10px; margin: 10px 0; font-size: 14px; }
    .plan-check { color: #27ae60; font-size: 18px; }
    .plan-check-white { color: rgba(255,255,255,0.9); font-size: 18px; }
    .plan-x { color: #ccc; font-size: 18px; }
    .payment-method { background: white; border-radius: 10px; padding: 14px 16px; display: flex; align-items: center; justify-content: space-between; margin-bottom: 8px; }
    .pm-info { display: flex; align-items: center; gap: 12px; }
    .pm-icon { width: 40px; height: 40px; border-radius: 8px; background: var(--green-light); display: flex; align-items: center; justify-content: center; font-size: 20px; }

    /* ADMIN */
    .admin-header { background: var(--green-dark); color: white; padding: 20px; display: flex; align-items: center; justify-content: space-between; }
    .alert-card { background: #fde8e8; border-radius: 12px; padding: 16px; display: flex; gap: 12px; align-items: center; margin-bottom: 16px; border: 1px solid rgba(231,76,60,0.2); }
    .stats-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
    .stat-card { background: white; border-radius: var(--radius-sm); padding: 16px; box-shadow: var(--shadow-sm); }
    .stat-icon { width: 44px; height: 44px; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 22px; margin-bottom: 12px; }
    .stat-val { font-size: 24px; font-weight: 800; color: var(--text-dark); }
    .stat-label { font-size: 12px; color: var(--text-light); font-weight: 500; margin-bottom: 4px; }
    .stat-change { font-size: 12px; font-weight: 600; color: var(--green-primary); }
    .stat-change-red { color: var(--accent-red); font-size: 12px; font-weight: 700; }
    .approval-row { background: white; border-radius: 12px; padding: 14px 16px; display: flex; align-items: center; gap: 12px; box-shadow: var(--shadow-sm); }
    .approval-avatar { width: 50px; height: 50px; border-radius: 50%; background: var(--green-light); display: flex; align-items: center; justify-content: center; font-size: 20px; flex-shrink: 0; }
    .approval-name { font-size: 15px; font-weight: 700; color: var(--text-dark); }
    .approval-sub { font-size: 12px; color: var(--text-light); }
    .approval-actions { display: flex; gap: 8px; margin-left: auto; }

// ── ASSISTANT ───────────────────────────────────────────────────────────────
const AssistantScreen = () => {
  const [messages, setMessages] = useState([
    { role: 'user', text: 'My wheat leaves are turning yellow with brown spots. What should I do?', time: '09:42 AM' },
    { role: 'ai', text: 'It sounds like it could be **Wheat Rust** or a nitrogen deficiency. Based on the spots, Wheat Rust is more likely.', urdu: 'ایسا لگتا ہے کہ یہ گندم کی کنگی یا نائٹروجن کی کمی ہو سکتی ہے۔ دھبوں کی بنیاد پر، گندم کی کنگی کا امکان زیادہ ہے۔', action: 'Apply a propiconazole-based fungicide and ensure proper drainage in the field.', time: '09:43 AM' },
  ]);
  const [input, setInput] = useState('');
  const [loading, setLoading] = useState(false);
  const messagesEndRef = useRef(null);
  const scrollToBottom = () => messagesEndRef.current?.scrollIntoView({ behavior: 'smooth' });
  useEffect(scrollToBottom, [messages]);

  const callClaude = async (userMsg) => {
    setLoading(true);
    try {
      const response = await fetch("https://api.anthropic.com/v1/messages", {
        method: "POST",
        headers: { "Content-Type": "application/json" },
        body: JSON.stringify({
          model: "claude-sonnet-4-20250514",
          max_tokens: 1000,
          system: "You are Kisan AI Assistant for Pakistani farmers. Answer farming questions in both English and Urdu. Provide practical advice about crops, diseases, weather, and market prices. Keep responses concise. Format: English explanation, then Urdu translation, then a recommended action if applicable.",
          messages: [{ role: "user", content: userMsg }]
        })
      });
      const data = await response.json();
      const text = data.content?.[0]?.text || "Sorry, I couldn't get a response. Please try again.";
      const now = new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
      setMessages(prev => [...prev, { role: 'ai', text, time: now }]);
    } catch (e) {
      setMessages(prev => [...prev, { role: 'ai', text: 'Network error. Please check your connection.', time: new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' }) }]);
    }
    setLoading(false);
  };

  const sendMsg = () => {
    if (!input.trim()) return;
    const now = new Date().toLocaleTimeString('en-US', { hour: '2-digit', minute: '2-digit' });
    setMessages(prev => [...prev, { role: 'user', text: input, time: now }]);
    callClaude(input);
    setInput('');
  };

  const suggestions = ['How to treat wheat rust?', 'Best fertilizer for rice?', 'Rain forecast tomorrow?'];

  return (
    <div style={{ display: 'flex', flexDirection: 'column', height: '100vh' }}>
      {/* Header */}
      <div style={{ background: 'var(--bg-main)', padding: '16px 20px 12px', borderBottom: '1px solid #e2e8f0' }}>
        <div style={{ display: 'flex', alignItems: 'center', gap: 12 }}>
          <div style={{ width: 44, height: 44, borderRadius: '50%', background: 'var(--green-primary)', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 22 }}>🤖</div>
          <div>
            <div style={{ fontSize: 16, fontWeight: 800, color: 'var(--green-dark)' }}>Kisan AI Assistant</div>
            <div style={{ fontSize: 12, color: '#27ae60', display: 'flex', alignItems: 'center', gap: 6 }}>
              <div style={{ width: 8, height: 8, borderRadius: '50%', background: '#27ae60' }}/>Online & Active
            </div>
          </div>
        </div>
      </div>

      {/* Messages */}
      <div style={{ flex: 1, overflowY: 'auto', padding: '16px', display: 'flex', flexDirection: 'column' }}>
        {messages.map((m, i) => (
          <div key={i} style={{ display: 'flex', flexDirection: 'column', alignItems: m.role === 'user' ? 'flex-end' : 'flex-start', marginBottom: 12 }}>
            {m.role === 'ai' && <div style={{ width: 28, height: 28, borderRadius: '50%', background: 'var(--accent-peach)', display: 'flex', alignItems: 'center', justifyContent: 'center', fontSize: 14, marginBottom: 4 }}>🤖</div>}
            <div className={`chat-bubble ${m.role === 'user' ? 'chat-me' : 'chat-ai'}`}>
              <div style={{ fontSize: 14, lineHeight: 1.5, whiteSpace: 'pre-wrap' }}>{m.text.replace(/\*\*(.*?)\*\*/g, '$1')}</div>
              {m.urdu && <div style={{ fontSize: 13, marginTop: 10, paddingTop: 10, borderTop: '1px solid rgba(45,122,79,0.2)', fontFamily: "'Noto Nastaliq Urdu',serif", direction: 'rtl', lineHeight: 2 }}>{m.urdu}</div>}
              {m.action && <div className="chat-action-box"><div style={{ fontSize: 13, fontWeight: 700, color: 'var(--green-dark)', marginBottom: 4 }}>💡 Recommended Action</div><div style={{ fontSize: 13, color: 'var(--text-mid)' }}>{m.action}</div></div>}
              <div className="chat-time" style={{ color: m.role === 'user' ? 'rgba(255,255,255,0.7)' : 'var(--text-light)' }}>{m.time}</div>
            </div>
          </div>
        ))}
        {loading && (
          <div style={{ display: 'flex', alignItems: 'flex-start', gap: 8, marginBottom: 12 }}>
            <div style={{ width: 28, height: 28, borderRadius: '50%', background: 'var(--accent-peach)', display: 'flex', alignItems: 'center', justifyContent: 'center' }}>🤖</div>
            <div className="chat-bubble chat-ai" style={{ display: 'flex', gap: 6, alignItems: 'center', padding: '14px 18px' }}>
              {[0, 1, 2].map(i => <div key={i} style={{ width: 8, height: 8, borderRadius: '50%', background: 'var(--green-primary)', animation: `pulse 1s ${i * 0.2}s infinite` }}/>)}
            </div>
          </div>
        )}
        <div ref={messagesEndRef}/>
      </div>

      {/* Suggestions */}
      <div style={{ padding: '8px 16px 0', display: 'flex', gap: 8, overflowX: 'auto' }}>
        {suggestions.map((s, i) => <button key={i} onClick={() => { setInput(s); }} style={{ background: 'var(--green-light)', border: '1px solid rgba(45,122,79,0.2)', borderRadius: 20, padding: '6px 14px', fontSize: 12, fontWeight: 600, color: 'var(--green-dark)', cursor: 'pointer', whiteSpace: 'nowrap' }}>🔬 {s}</button>)}
      </div>

      {/* Input */}
      <div style={{ padding: '10px 16px 90px', background: 'var(--bg-main)', borderTop: '1px solid #e2e8f0' }}>
        <div style={{ display: 'flex', gap: 10, alignItems: 'center' }}>
          <button style={{ width: 40, height: 40, borderRadius: '50%', background: 'white', border: '1px solid #e2e8f0', display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer', flexShrink: 0 }}>
            <Icon name="clip" size={18} color="var(--text-light)"/>
          </button>
          <input value={input} onChange={e => setInput(e.target.value)} onKeyDown={e => e.key === 'Enter' && sendMsg()} placeholder="Ask anything about your crops..." style={{ flex: 1, padding: '12px 16px', borderRadius: 24, border: '1.5px solid #e2e8f0', fontSize: 14, fontFamily: 'Plus Jakarta Sans, sans-serif', outline: 'none', background: 'white' }}/>
          <button onClick={sendMsg} style={{ width: 44, height: 44, borderRadius: '50%', background: 'var(--green-primary)', border: 'none', display: 'flex', alignItems: 'center', justifyContent: 'center', cursor: 'pointer', flexShrink: 0 }}>
            <Icon name="send" size={18} color="white"/>
          </button>
        </div>
        <div style={{ textAlign: 'center', marginTop: 6 }}>
          <button style={{ background: 'transparent', border: 'none', color: 'var(--green-primary)', fontSize: 12, cursor: 'pointer', fontWeight: 600 }}>📷 Analyze a Crop Photo</button>
        </div>
      </div>
    </div>
  );
};

        {activeTab === 'assistant' && <AssistantScreen/>}
        {activeTab === 'prices' && <PricesScreen/>}
        {activeTab === 'profile' && <ProfileScreen onNav={setActiveTab} isPremium={isPremium}/>}
      </div>

      <nav className="bottom-nav">
        {tabs.map(t => t.id === 'assistant' ? (
          <div key={t.id} className="nav-bubble" onClick={() => setActiveTab(t.id)} style={{ cursor: 'pointer' }}>
            <div className="nav-icon"><Icon name={t.icon} size={22} color="white"/></div>
            <span>{t.label}</span>
          </div>
        ) : (
          <div key={t.id} className={`nav-item ${activeTab === t.id ? 'active' : ''}`} onClick={() => setActiveTab(t.id)}>
            <div className="nav-icon"><Icon name={t.icon} size={22}/></div>
            <span>{t.label}</span>
          </div>
        ))}
      </nav>
    </div>
  );
};

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
